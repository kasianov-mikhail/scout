name: Stale

# Housekeeping for inactive issues and pull requests. Runs daily on a schedule
# (and on demand): anything untouched for 60 days is marked stale, then closed
# 14 days later unless activity resumes. Items labelled pinned or security are
# exempt.
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been inactive for 60 days, so it has been marked as
            stale. It will be closed in 14 days unless there is new activity.
          stale-pr-message: >
            This pull request has been inactive for 60 days, so it has been
            marked as stale. It will be closed in 14 days unless there is new
            activity.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
