name: Server

# Contract tests against a live scout-server. The HTTP wire format
# (HTTPQueryCoding/HTTPRecordCoding) is shared with that repository, and unit
# tests can only verify Scout's side of it, so this workflow boots the server
# on top of PostgreSQL and runs ServerContractTests through HTTPDatabase.
#
# The expensive `contract` job runs only when the wire surface changes — the
# Hosted transport/access code that travels over it (HTTPDatabase, the
# HTTPQueryCoding/HTTPRecordCoding wire coders, and the HostedRecord readers and
# writers), the Core/Database record model and the RecordReader/RecordChunk/
# RecordCursor pagination and cursor semantics they ride on, the contract tests,
# or this workflow — or when scout-server pushes to main (repository_dispatch
# from its Notify workflow).
#
# A weekly schedule runs the contract unconditionally as a safety net: the path
# filter duplicates the knowledge of where the wire code lives, so if it ever
# drifts and a wire change slips through with `contract` skipped, the next
# scheduled run surfaces the break instead of letting it sit green indefinitely.
#
# A required status check must report on every PR, but a path-filtered job never
# reports on PRs outside its paths, which would wedge them forever. So the PR
# trigger is unfiltered, a lightweight `changes` job decides whether `contract`
# runs, and an always-running `contract-gate` reports the result on every PR
# (passing when `contract` succeeded or was not applicable). Make
# `Server / contract-gate` the required check, not `Server / contract`.
on:
  push:
    branches: [main]
    paths:
      - "Sources/Scout/Hosted/**"
      - "Sources/Scout/Core/Database/**"
      - "Tests/ScoutTests/Core/Backend/**"
      - ".github/workflows/server.yml"
  pull_request:
  repository_dispatch:
    types: [scout-server-updated]
  schedule:
    # Monday 06:00 UTC — unconditional safety-net run (see header).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether the wire surface changed. Required checks must report on
  # every PR (see header), so this runs unconditionally and `contract` keys off
  # its output; non-PR events always exercise the contract.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      # blob:none keeps the full-history fetch below from downloading every
      # historical blob (snapshot PNGs included): this job only greps the
      # working tree and diffs file names, so historical content is never
      # needed.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: blob:none

      # Tripwire against filter drift. The path filter below duplicates the
      # knowledge of where the wire code lives, so a future move out of the
      # watched directories would silently stop triggering `contract` while the
      # gate stays green. Symbol names outlive folder layout, so assert the wire
      # code still sits under a watched root and fail loudly (red PR) when it
      # escapes — that is the signal to widen the filter. The HTTP* coders are
      # wire-specific, so any mention pins them down; the Record pagination types
      # are shared infra used all over the app, so only their definition sites
      # matter (their use sites legitimately live outside the watched roots).
      - name: Guard the filter covers the wire code
        run: |
          escaped="$(
            {
              grep -rlE 'HTTPDatabase|HTTPQueryCoding|HTTPRecordCoding' Sources
              grep -rlE '(struct|enum|final class|class) +(RecordReader|RecordChunk|RecordCursor)\b' Sources
            } | sort -u | grep -vE '^Sources/Scout/(Hosted/|Core/Database/)' || true
          )"
          if [ -n "$escaped" ]; then
            echo "::error::Wire-contract code lives outside the Server filter's watched paths; update the paths in this workflow to cover:"
            echo "$escaped"
            exit 1
          fi

      - name: Detect wire-surface changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD \
            | grep -qE '^(Sources/Scout/Hosted/|Sources/Scout/Core/Database/|Tests/ScoutTests/Core/Backend/|\.github/workflows/server\.yml$)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

  contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: kasianov-mikhail/scout-server
          path: scout-server

      # The server's default Fluent config: user scout, password scout,
      # database scout on localhost:5432.
      - name: Start PostgreSQL
        run: |
          brew install postgresql@17
          pgbin="$(brew --prefix postgresql@17)/bin"
          brew services start postgresql@17
          for _ in $(seq 1 30); do
            if "$pgbin/pg_isready" -q -h 127.0.0.1; then
              break
            fi
            sleep 1
          done
          if ! "$pgbin/pg_isready" -q -h 127.0.0.1; then
            echo "PostgreSQL did not become ready on 127.0.0.1:5432"
            exit 1
          fi
          "$pgbin/psql" -h 127.0.0.1 -d postgres -c "CREATE ROLE scout LOGIN PASSWORD 'scout'"
          "$pgbin/createdb" -h 127.0.0.1 -O scout scout

      - name: Start scout-server
        working-directory: scout-server
        run: |
          swift build
          nohup swift run --skip-build > server.log 2>&1 &
          for _ in $(seq 1 60); do
            if curl -fs -o /dev/null http://127.0.0.1:8080/healthz; then
              exit 0
            fi
            sleep 1
          done
          echo "scout-server did not come up on port 8080"
          exit 1

      # The contract is platform-independent, so the tests run on the macOS
      # destination — no simulator needed. xcodebuild forwards only variables
      # with the TEST_RUNNER_ prefix into the test process (which reads them
      # without it), so an API key would have to be set as
      # TEST_RUNNER_SCOUT_SERVER_API_KEY — a bare SCOUT_SERVER_API_KEY never
      # arrives. The default server accepts unauthenticated requests, so none
      # is set today.
      - name: Run contract tests
        env:
          TEST_RUNNER_SCOUT_SERVER_URL: http://127.0.0.1:8080
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            -only-testing:ScoutTests/ServerContractTests \
            -resultBundlePath TestResults.xcresult \
            test

      # The suite is skipped unless SCOUT_SERVER_URL reaches the test process,
      # so a broken env hand-off (or an -only-testing identifier that matches
      # nothing) would skip every test while xcodebuild still exits 0. Fail
      # loudly when nothing actually ran rather than report a green that tested
      # nothing.
      - name: Verify the contract suite ran
        run: |
          summary="$(xcrun xcresulttool get test-results summary \
            --path TestResults.xcresult --compact)"
          # `0 passed` is a real count (jq's // keeps it); only a missing field
          # yields empty, in which case the schema changed — warn, don't block.
          passed="$(echo "$summary" | jq '.passedTests // empty')"
          if [ -z "$passed" ]; then
            echo "::warning::Could not read passedTests from the result bundle; skipping the ran-something check."
            echo "$summary" | head -c 2000
            exit 0
          fi
          echo "Contract tests passed: $passed"
          if [ "$passed" -lt 1 ]; then
            echo "::error::No contract tests executed — the suite skipped (SCOUT_SERVER_URL likely never reached the test process) or matched nothing."
            exit 1
          fi

      - name: Dump server log
        if: failure()
        run: cat scout-server/server.log

  # The required status check. Always runs so it reports on every PR; passes
  # when `contract` succeeded or was not applicable (skipped on PRs that leave
  # the wire surface untouched), fails when `contract` failed or `changes` broke.
  contract-gate:
    name: contract-gate
    needs: [changes, contract]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require the contract to pass (or be N/A)
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::The changes job did not succeed (${{ needs.changes.result }})."
            exit 1
          fi
          result="${{ needs.contract.result }}"
          echo "contract job result: $result"
          case "$result" in
            success | skipped)
              echo "Gate passes."
              ;;
            *)
              echo "::error::The contract check did not pass (result: $result)."
              exit 1
              ;;
          esac
