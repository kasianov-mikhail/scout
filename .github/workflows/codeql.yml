name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "33 7 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    runs-on: macos-26
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'generic/platform=iOS Simulator' \
            build

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
