name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources Tests

  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            test-without-building

  notify:
    needs: tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changes
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log --format="- %s" "$LAST_TAG"..HEAD)
          else
            LOG=$(git log --format="- %s" -10)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Trigger scout-ip
        run: |
          jq -n --arg log "${{ steps.changes.outputs.log }}" --arg sha "${{ github.sha }}" \
            '{"event_type":"scout-updated","client_payload":{"sha":$sha,"changes":$log}}' | \
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/kasianov-mikhail/scout-ip/dispatches \
            -d @-
