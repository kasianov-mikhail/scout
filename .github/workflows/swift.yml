name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources Tests

  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26

    steps:
      - uses: actions/checkout@v7

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            test-without-building

      - name: Report coverage
        run: |
          {
            echo "### Coverage (iOS ${{ matrix.ios }})"
            echo '```'
            xcrun xccov view --report --only-targets TestResults.xcresult
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Convert coverage to Cobertura
        env:
          HOMEBREW_REQUIRE_TAP_TRUST: 1
        run: |
          # Preinstalled third-party taps are untrusted and trigger tap-trust warnings
          brew tap | grep -v '^homebrew/' | xargs -n1 brew untap || true
          brew update --quiet
          brew trust --tap a7ex/homebrew-formulae
          brew install a7ex/homebrew-formulae/xcresultparser
          xcresultparser --output-format cobertura TestResults.xcresult > coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          flags: ios-${{ matrix.ios }}
          disable_search: true
          use_oidc: true
