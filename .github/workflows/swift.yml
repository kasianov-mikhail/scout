name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Lint
        run: |
          if ! xcrun swift-format lint --strict --recursive Sources Tests; then
            fix="xcrun swift-format format --in-place --recursive Sources Tests"
            echo "::error::swift-format found formatting issues. Fix them locally with: $fix"
            {
              echo "### swift-format failed"
              echo "Run this locally and commit the result:"
              echo '```'
              echo "$fix"
              echo '```'
              echo "Tip: install the pre-commit hook so this is applied automatically on every commit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    strategy:
      # The xcode-27 leg runs a public-preview image; keep a failure there from
      # cancelling the stable legs, whose checks are required on main.
      fail-fast: false
      matrix:
        # Coverage is collected on one leg only: the reports differ between
        # legs by fractions of a percent, and instrumentation, xcresult
        # conversion, and the Codecov upload cost minutes on every run. The
        # iOS 26 leg carries it because the snapshot suites only execute there.
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
            coverage: false
          - os: macos-26
            device: iPhone 17
            ios: 26
            coverage: true
          # Public-preview image, labelled by Xcode major version rather than
          # the OS and arm64-only. It runs alongside the stable legs and is not
          # a required check, so its failures don't block merges. Snapshot
          # baselines are iOS 26 only, so those suites skip on this leg.
          - os: xcode-27
            device: iPhone 17
            ios: 27
            coverage: false

    steps:
      - uses: actions/checkout@v7

      # A name-only destination resolves to the newest runtime on the image,
      # so the iOS 18 leg was silently running its tests on an iOS 26
      # simulator. Resolve a device on the matrix major version explicitly and
      # address it by UDID.
      - name: Prepare simulator
        id: sim
        run: |
          if ! xcrun simctl list runtimes | grep -q "^iOS ${{ matrix.ios }}\."; then
            xcodebuild -downloadPlatform iOS
          fi
          runtime=$(xcrun simctl list runtimes --json \
            | jq -r '.runtimes[] | select(.platform == "iOS" and (.version | startswith("${{ matrix.ios }}."))) | .identifier' \
            | tail -1)
          if [ -z "$runtime" ]; then
            echo "No iOS ${{ matrix.ios }} simulator runtime is available."
            xcrun simctl list runtimes
            exit 1
          fi
          udid=$(xcrun simctl list devices available --json \
            | jq -r --arg rt "$runtime" '.devices[$rt][]? | select(.name == "${{ matrix.device }}") | .udid' \
            | head -1)
          if [ -z "$udid" ]; then
            udid=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device }}" "$runtime")
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      # Package.resolved is not committed, so the key falls back to the
      # manifest: any Package.swift change starts a fresh cache, and
      # restore-keys reuse the previous checkouts for the git fetches that
      # resolution still performs.
      - name: Cache Swift package checkouts
        uses: actions/cache@v6
        with:
          path: /tmp/spm
          key: spm-${{ hashFiles('Package.swift') }}
          restore-keys: spm-

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -clonedSourcePackagesDirPath /tmp/spm \
            -enableCodeCoverage ${{ matrix.coverage && 'YES' || 'NO' }} \
            -skipMacroValidation \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -enableCodeCoverage ${{ matrix.coverage && 'YES' || 'NO' }} \
            -resultBundlePath TestResults.xcresult \
            test-without-building

      - name: Report coverage
        if: matrix.coverage
        run: |
          {
            echo "### Coverage (iOS ${{ matrix.ios }})"
            echo '```'
            xcrun xccov view --report --only-targets TestResults.xcresult
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
