name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources Tests

  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            build-for-testing

      - uses: actions/cache/restore@v4
        with:
          path: main-framework-size.txt
          key: framework-size-ios-${{ matrix.ios }}-
          restore-keys: framework-size-ios-${{ matrix.ios }}-

      - name: Framework size
        run: |
          FRAMEWORK=$(find ~/Library/Developer/Xcode/DerivedData \
            -path "*/PackageFrameworks/Scout.framework" -print -quit 2>/dev/null)

          CURRENT=$(du -sk "$FRAMEWORK" 2>/dev/null | cut -f1)

          if [ -f main-framework-size.txt ]; then
            MAIN=$(cat main-framework-size.txt)
            DIFF=$((CURRENT - MAIN))
            if [ "$DIFF" -eq 0 ]; then
              echo "Scout.framework: ${CURRENT}KB" >> "$GITHUB_STEP_SUMMARY"
            else
              printf 'Scout.framework: %sKB (%+dKB)\n' "$CURRENT" "$DIFF" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Scout.framework: ${CURRENT}KB" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "$CURRENT" > main-framework-size.txt

      - uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: main-framework-size.txt
          key: framework-size-ios-${{ matrix.ios }}-${{ github.sha }}

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults \
            test-without-building

      - name: Test failures
        if: failure()
        run: |
          xcrun xcresulttool get test-results summary --path TestResults.xcresult \
            | jq -r '.testFailures[]? | "::error title=\(.testName)::\(.failureText) [\(.testIdentifierString)]"'

      - name: Coverage
        run: |
          xcrun xccov view --report --only-targets TestResults.xcresult | grep -v ScoutTests
