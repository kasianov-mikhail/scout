name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

      - name: Run unit tests
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            test
