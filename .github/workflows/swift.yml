name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-15
            ios: 18
          - os: macos-26
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator' \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator' \
            test-without-building
