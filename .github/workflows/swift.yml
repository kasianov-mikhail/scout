name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-13
            device: iPhone 14
            ios: 16
          - os: macos-14
            device: iPhone 15
            ios: 17
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults \
            test-without-building

      - name: Coverage
        run: |
          xcrun xccov view --report --only-targets TestResults.xcresult | grep -v ScoutTests
