name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources Tests

  tests:
    name: test-ios-${{ matrix.ios }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            test-without-building
