name: Swift

# The primary CI: lints with swift-format, then builds and tests the package
# across a matrix of iOS versions. The matrix spans the package's minimum
# deployment target (iOS 16) up to the latest public-preview toolchain
# (xcode-27), so both old-SDK breakage and new-SDK regressions surface here.
# Coverage is collected on the iOS 26 leg only — the reports differ between legs
# by fractions of a percent, and that leg is the one where the snapshot suites
# run. The stable iOS 18 / iOS 26 legs are the required checks on main.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Lint
        run: |
          if ! xcrun swift-format lint --strict --recursive Sources Tests; then
            fix="xcrun swift-format format --in-place --recursive Sources Tests"
            echo "::error::swift-format found formatting issues. Fix them locally with: $fix"
            {
              echo "### swift-format failed"
              echo "Run this locally and commit the result:"
              echo '```'
              echo "$fix"
              echo '```'
              echo "Tip: install the pre-commit hook so this is applied automatically on every commit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # `needs: lint` gates the matrix on this workflow's own fast check; the other
  # fast checks (Core Data model rules, the wire-change probe) live in sibling
  # workflows where `needs` cannot reach them. This cheap ubuntu job waits for
  # their check-runs on the PR and fails if either fails, so the expensive macOS
  # matrix below never starts behind an already-red fast check. It runs only on
  # PRs — on a push to main those sibling checks do not run.
  gate:
    name: gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      checks: read

    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none

      - name: Wait for the fast cross-workflow checks
        env:
          GH_TOKEN: ${{ github.token }}
          SHAS: ${{ github.event.pull_request.head.sha }} ${{ github.sha }}
          CHECKS: model-versions changes
        run: .github/scripts/wait-for-checks.sh

  tests:
    name: test-ios-${{ matrix.ios }}
    needs: [lint, gate]
    # On a push to main `gate` is skipped (it is PR-only); require lint and let
    # a skipped gate through, but block on a gate that actually failed.
    if: ${{ always() && needs.lint.result == 'success' && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    strategy:
      # A failure in any leg cancels the remaining in-progress legs, including
      # the stable iOS 18 / iOS 26 legs whose checks are required on main. Note
      # this also lets a flake on the xcode-27 public-preview image tear down the
      # whole run.
      fail-fast: true
      matrix:
        # Coverage is collected on one leg only: the reports differ between
        # legs by fractions of a percent, and instrumentation, xcresult
        # conversion, and the Codecov upload cost minutes on every run. The
        # iOS 26 leg carries it because the snapshot suites only execute there.
        include:
          # iOS 16 and 17 are not built-in runtimes on the macos-15 image, and a
          # bare -downloadPlatform iOS only fetches the newest runtime. Pin an
          # exact version so the download step pulls each older runtime
          # explicitly. iOS 16 is the package's minimum deployment target.
          # CacheTests links SwiftData (iOS 17+), so its bundle can't load
          # on iOS 16; skip it there. The rest of the suites carry no SwiftData
          # and run, exercising the package's minimum deployment target.
          - os: macos-15
            device: iPhone 14
            ios: 16
            runtime: "16.4"
            coverage: false
            skipTesting: CacheTests
          - os: macos-15
            device: iPhone 15
            ios: 17
            runtime: "17.5"
            coverage: false
          - os: macos-15
            device: iPhone 16
            ios: 18
            coverage: false
          - os: macos-26
            device: iPhone 17
            ios: 26
            coverage: true
          # Public-preview image, labelled by Xcode major version rather than
          # the OS and arm64-only. It runs alongside the stable legs and is a
          # required check, so its failures block merges. Snapshot baselines are
          # iOS 26 only, so those suites skip on this leg.
          - os: xcode-27
            device: iPhone 17
            ios: 27
            coverage: false

    steps:
      - uses: actions/checkout@v7

      # A name-only destination resolves to the newest runtime on the image,
      # so the iOS 18 leg was silently running its tests on an iOS 26
      # simulator. Resolve a device on the matrix major version explicitly and
      # address it by UDID.
      - name: Prepare simulator
        id: sim
        run: |
          if ! xcrun simctl list runtimes | grep -q "^iOS ${{ matrix.ios }}\."; then
            if [ -n "${{ matrix.runtime }}" ]; then
              xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.runtime }}"
            else
              xcodebuild -downloadPlatform iOS
            fi
          fi
          runtime=$(xcrun simctl list runtimes --json \
            | jq -r '.runtimes[] | select(.platform == "iOS" and (.version | startswith("${{ matrix.ios }}."))) | .identifier' \
            | tail -1)
          if [ -z "$runtime" ]; then
            echo "No iOS ${{ matrix.ios }} simulator runtime is available."
            xcrun simctl list runtimes
            exit 1
          fi
          udid=$(xcrun simctl list devices available --json \
            | jq -r --arg rt "$runtime" '.devices[$rt][]? | select(.name == "${{ matrix.device }}") | .udid' \
            | head -1)
          if [ -z "$udid" ]; then
            udid=$(xcrun simctl create "${{ matrix.device }}" "${{ matrix.device }}" "$runtime")
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      # Package.resolved is not committed, so the key falls back to the
      # manifest: any Package.swift change starts a fresh cache, and
      # restore-keys reuse the previous checkouts for the git fetches that
      # resolution still performs.
      - name: Cache Swift package checkouts
        uses: actions/cache@v6
        with:
          path: /tmp/spm
          key: spm-${{ hashFiles('Package.swift') }}
          restore-keys: spm-

      - name: Build
        run: |
          xcodebuild \
            -scheme Scout-Package \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -clonedSourcePackagesDirPath /tmp/spm \
            -enableCodeCoverage ${{ matrix.coverage && 'YES' || 'NO' }} \
            -skipMacroValidation \
            build-for-testing

      - name: Test
        run: |
          xcodebuild \
            -scheme Scout-Package \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -enableCodeCoverage ${{ matrix.coverage && 'YES' || 'NO' }} \
            ${{ matrix.skipTesting && format('-skip-testing:{0}', matrix.skipTesting) || '' }} \
            -parallel-testing-enabled NO \
            -resultBundlePath TestResults.xcresult \
            test-without-building

      - name: Report coverage
        if: matrix.coverage
        run: |
          {
            echo "### Coverage (iOS ${{ matrix.ios }})"
            echo '```'
            xcrun xccov view --report --only-targets TestResults.xcresult
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
